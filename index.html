<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Video Demonstration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 30px;
      color: #333;
    }

    .video-container {
      margin: 40px auto 20px auto;
      max-width: 800px;
      width: 90%;
    }

    video {
      width: 100%;
      border-radius: 10px;
      background: black;
    }

    .backup-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 22px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .backup-btn:hover {
      background: #555;
    }
  </style>
</head>
<body>

  <h1>Project Video Demonstration</h1>
  <p>Scan the QR code to view the video demonstration.</p>

  <a class="backup-btn" href="" target="_blank">
    Backup Video Link
  </a>

  <div class="video-container">
    <h2>Stage 3 Flood Gate</h2>
    <video controls>
      <source src="TECHvid.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <div class="video-container">
    <h2>Stage 2 Flood Gate</h2>
    <video controls>
      <source src="258a84244e95491c8c056a9841812733.mov" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

</body>
</html>
